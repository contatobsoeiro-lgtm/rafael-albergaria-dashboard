# ─────────────────────────────────────────────────────────────
# GitHub Actions — Dashboard de Vendas Rafael Albergaria
# Roda a cada 1 hora: baixa planilha → gera HTML → publica
# ─────────────────────────────────────────────────────────────

name: Atualizar Dashboard

on:
  schedule:
    # Cron: a cada hora, nos minutos :00
    # Formato: minuto hora dia mês dia-da-semana (UTC)
    - cron: "0 * * * *"

  # Permite rodar manualmente pelo painel do GitHub Actions
  workflow_dispatch:
    inputs:
      force_notify:
        description: "Enviar notificação mesmo sem mudanças?"
        required: false
        default: "false"

# Permissão para fazer push no repositório (necessário para GitHub Pages)
permissions:
  contents: write
  pages: write
  id-token: write

env:
  PYTHON_VERSION: "3.11"

jobs:
  update-dashboard:
    name: "🔄 Atualizar Dashboard"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 1. Checkout do repositório
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 2. Configura Python
      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      # 3. Instala dependências
      - name: Instalar dependências
        run: pip install -r requirements.txt

      # 4. Roda o pipeline completo
      - name: Processar planilha e gerar HTML
        id: pipeline
        env:
          SHEET_URL:          ${{ secrets.SHEET_URL }}
          SHEET_TYPE:         ${{ secrets.SHEET_TYPE }}
          NOTIFY_CHANNEL:     ${{ secrets.NOTIFY_CHANNEL }}
          DASHBOARD_URL:      ${{ secrets.DASHBOARD_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          WEBHOOK_URL:        ${{ secrets.WEBHOOK_URL }}
          WHATSAPP_PHONE:     ${{ secrets.WHATSAPP_PHONE }}
          WHATSAPP_APIKEY:    ${{ secrets.WHATSAPP_APIKEY }}
        run: python scripts/run_pipeline.py

      # 5. Faz commit e push do HTML gerado
      - name: Commit e push do HTML atualizado
        run: |
          git config user.name  "dashboard-bot[bot]"
          git config user.email "dashboard-bot@users.noreply.github.com"

          git add docs/index.html history/

          # Só faz commit se houve mudança
          if git diff --staged --quiet; then
            echo "Sem alterações no HTML — nenhum commit necessário."
          else
            TIMESTAMP=$(date -u +"%d/%m/%Y %H:%M UTC")
            git commit -m "chore: atualiza dashboard — ${TIMESTAMP}"
            git push
            echo "✅ HTML publicado com sucesso."
          fi

      # 6. (Opcional) Publica no GitHub Pages caso use branch gh-pages
      # Descomente se preferir publicar via Actions em vez de configurar Pages na branch main/docs
      # - name: Deploy para GitHub Pages
      #   uses: peaceiris/actions-gh-pages@v3
      #   with:
      #     github_token: ${{ secrets.GITHUB_TOKEN }}
      #     publish_dir:  ./docs
      #     keep_files:   false

  # Job separado: notifica em caso de falha
  notify-failure:
    name: "🚨 Notificar Falha"
    runs-on: ubuntu-latest
    needs: update-dashboard
    if: failure()
    steps:
      - name: Enviar alerta de falha via Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            MSG="⚠️ *Falha na atualização do Dashboard!*%0A%0AVerifique: https://github.com/${{ github.repository }}/actions"
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}&text=${MSG}&parse_mode=Markdown" > /dev/null
          fi
